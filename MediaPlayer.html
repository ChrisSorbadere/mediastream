function deleteDrive(idx) {
  if (!confirm('Supprimer ce dossier Drive ?')) return;
  driveFolders.splice(idx, 1);
  saveData(); closeModal();
  if (currentView?.type === 'drive' && currentView.idx === idx) showRecents();
  else renderSidebar();
}

// ═══════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════
async function exportData() {
  const data = {
    folders,
    driveFolders,
    history: getHistory(),
    positions: getPositions(),
    radioFavorites: getRadioFavorites(),
    queue: getQueue(),
  };
  const json = JSON.stringify(data, null, 2);
  const filename = 'mediastream-' + new Date().toISOString().slice(0,10) + '.json';

  // 1) Tente le partage de fichier natif Android (menu "Enregistrer / Envoyer" sans ouverture forcée)
  try {
    const file = new File([json], filename, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'Sauvegarde MediaStream' });
      toast('💾 Sauvegarde partagée');
      return;
    }
  } catch(e) {
    // Si l'utilisateur annule le partage ou erreur, on bascule sur le téléchargement classique
    if (e.name === 'AbortError') return; // annulation volontaire
  }

  // 2) Repli : téléchargement classique
  const blob = new Blob([json], { type: 'application/octet-stream' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 1000);
  toast('💾 Sauvegarde exportée');
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) { folders = data; } // ancien format
      else {
        if (data.folders) folders = data.folders;
        if (data.driveFolders) driveFolders = data.driveFolders;
        if (data.history) localStorage.setItem(HISTORY_KEY, JSON.stringify(data.history));
        if (data.positions) localStorage.setItem(POSITION_KEY, JSON.stringify(data.positions));
        if (data.radioFavorites) localStorage.setItem(RADIO_FAVORITES_KEY, JSON.stringify(data.radioFavorites));
        if (data.queue) localStorage.setItem(QUEUE_KEY, JSON.stringify(data.queue));
      }
      saveData(); closeModal(); renderSidebar();
      alert('Importation réussie.');
    } catch(err) { alert('Erreur : ' + err.message); }
  };
  reader.readAsText(file);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay-bg').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay-bg').classList.remove('visible');
  // Vide la barre de recherche du header au changement de vue (évite un filtre fantôme)
  const search = document.getElementById('search-input');
  if (search) search.value = '';
  // Masque le bouton "Non lus" par défaut (réaffiché seulement dans les dossiers de podcasts)
  const btnUnread = document.getElementById('btn-unread');
  if (btnUnread) btnUnread.style.display = 'none';
}

function escapeHTML(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'}); }
  catch(e) { return d.slice(0,10); }
}
function formatTime(s) {
  s = Math.floor(s);
  const m = Math.floor(s/60), sec = s%60;
  if (m >= 60) { const h = Math.floor(m/60); return `${h}h${(m%60).toString().padStart(2,'0')}`; }
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function formatDuration(d) {
  if (!d) return '';
  // Format possible : "HH:MM:SS", "MM:SS", ou nombre de secondes
  if (/^\d+$/.test(d)) return formatTime(parseInt(d));
  const parts = d.split(':').map(p => parseInt(p) || 0);
  if (parts.length === 3) return `${parts[0]}h${parts[1].toString().padStart(2,'0')}`;
  if (parts.length === 2) return `${parts[0]}:${parts[1].toString().padStart(2,'0')}`;
  return d;
}
