<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<link rel="icon" type="image/png" href="favicon_32.png">
<link rel="apple-touch-icon" href="icon_192.png">
<link rel="manifest" href="manifest.json">
<title>MediaStream</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #1c2333; --bg4: #21262d;
    --border: #30363d; --border2: #444c56;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --accent: #58a6ff; --accent2: #1f6feb;
    --green: #3fb950; --red: #f85149; --amber: #d29922; --purple: #bc8cff;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; overscroll-behavior: none; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: var(--font-mono); font-size: 14px; font-weight: 700; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; cursor: pointer; }
  .logo span { color: var(--text3); }
  .menu-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text2); padding: 5px 10px; cursor: pointer; font-size: 14px; display: none; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text); font-size: 13px; width: 200px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  .settings-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); padding: 5px 10px; cursor: pointer; font-size: 14px; }
  .settings-btn:hover { color: var(--text); }

  .main { display: flex; flex: 1; overflow: hidden; }

  .sidebar { width: 230px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  .sidebar-header { padding: 12px 14px 8px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .sidebar-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
  .btn-add { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-size: 11px; padding: 3px 8px; cursor: pointer; }
  .btn-add:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 6px 0; }

  .folder-item { display: flex; align-items: center; gap: 8px; padding: 9px 14px; cursor: pointer; font-size: 13px; border-left: 2px solid transparent; color: var(--text2); user-select: none; }
  .folder-item:hover { background: var(--bg3); color: var(--text); }
  .folder-item.active { background: var(--bg3); border-left-color: var(--accent); color: var(--text); }
  .folder-item.special { color: var(--purple); }
  .folder-item.special.active { border-left-color: var(--purple); }
  .folder-icon { font-size: 14px; flex-shrink: 0; }
  .folder-count { margin-left: auto; font-size: 10px; background: var(--bg4); color: var(--text3); padding: 1px 6px; border-radius: 10px; }
  .folder-item.active .folder-count { background: var(--accent2); color: #fff; }
  .folder-actions { display: none; gap: 4px; margin-left: 4px; }
  .folder-item:hover .folder-actions, .folder-item.active .folder-actions { display: flex; }
  .folder-action-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 0 3px; }
  .folder-action-btn:hover { color: var(--accent); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 6px 10px; }

  .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .content-header { padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .content-title { font-size: 15px; font-weight: 600; }
  .badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .badge-blue { background: rgba(88,166,255,0.15); color: var(--accent); }
  .badge-red { background: rgba(248,81,73,0.15); color: var(--red); }
  .badge-purple { background: rgba(188,140,255,0.15); color: var(--purple); }

  .episodes-list { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
  .episode-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; margin-bottom: 3px; }
  .episode-item:hover { background: var(--bg3); border-color: var(--border); }
  .episode-item.playing { background: var(--bg3); border-color: var(--accent2); }
  .ep-thumb { width: 40px; height: 40px; border-radius: 6px; background: var(--bg4); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid var(--border); }
  .ep-info { flex: 1; min-width: 0; }
  .ep-title { font-size: 13px; font-weight: 500; line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .ep-meta { font-size: 11px; color: var(--text3); margin-top: 3px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .ep-source { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: var(--bg4); color: var(--text2); }
  .ep-resume { font-size: 10px; padding: 1px 6px; border-radius: 3px; background: rgba(63,185,80,0.15); color: var(--green); font-family: var(--font-mono); }
  .ep-action { flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--bg4); color: var(--accent); font-size: 10px; border: 1px solid var(--border); align-self: center; }
  .episode-item:hover .ep-action { background: var(--accent2); color: white; }

  /* PLAYER */
  .player { background: var(--bg2); border-top: 1px solid var(--border); padding: 10px 16px 12px; flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
  .player-top { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .player-art { width: 38px; height: 38px; border-radius: 6px; background: var(--bg4); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .player-info { flex: 1; min-width: 0; }
  .player-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .player-status { font-size: 10px; padding: 3px 7px; border-radius: 3px; background: rgba(63,185,80,0.15); color: var(--green); font-family: var(--font-mono); font-weight: 600; }
  .player-status.idle { background: var(--bg4); color: var(--text3); }
  audio { width: 100%; height: 38px; accent-color: var(--accent); }

  /* CONTROLES SUPP */
  .control-bar { display: flex; align-items: center; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .control-btn { background: var(--bg4); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-size: 13px; padding: 5px 9px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
  .control-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .control-btn.active { background: var(--accent2); color: white; border-color: var(--accent); }
  .control-btn.icon-only { padding: 5px 8px; }
  .control-spacer { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  .speed-bar { display: flex; align-items: center; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .speed-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.08em; margin-right: 4px; }
  .speed-btn { background: var(--bg4); border: 1px solid var(--border); border-radius: 4px; color: var(--text2); font-size: 11px; font-family: var(--font-mono); padding: 3px 9px; cursor: pointer; line-height: 1.5; }
  .speed-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
  .speed-btn.active { background: var(--accent2); color: white; border-color: var(--accent); }

  .loading-text { color: var(--text3); font-size: 13px; text-align: center; padding: 30px; font-family: var(--font-mono); }
  .loading-text .dot { display: inline-block; animation: blink 1.2s infinite; }
  .loading-text .dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-text .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  .empty-text { color: var(--text3); font-size: 13px; text-align: center; padding: 30px; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); padding: 16px; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; padding: 22px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .modal-input, .modal-select { width: 100%; padding: 9px 11px; font-size: 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; margin-bottom: 10px; font-family: var(--font); }
  .modal-input:focus, .modal-select:focus { border-color: var(--accent); }
  .modal-input::placeholder { color: var(--text3); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .btn-cancel, .btn-ok, .btn-danger { padding: 8px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
  .btn-cancel { background: none; color: var(--text2); border-color: var(--border); }
  .btn-cancel:hover { background: var(--bg3); color: var(--text); }
  .btn-ok { background: var(--accent2); color: white; border: none; font-weight: 500; }
  .btn-ok:hover { background: var(--accent); }
  .btn-danger { background: rgba(248,81,73,0.2); color: var(--red); border-color: rgba(248,81,73,0.4); margin-right: auto; }
  .btn-danger:hover { background: rgba(248,81,73,0.3); }
  .modal-error { color: var(--red); font-size: 12px; margin-bottom: 8px; font-family: var(--font-mono); padding: 6px 8px; background: rgba(248,81,73,0.1); border-radius: 4px; }
  .modal-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .modal-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
  .modal-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; font-size: 12px; border-bottom: 1px solid var(--border); }
  .modal-list-item:last-child { border-bottom: none; }
  .modal-list-item-name { flex: 1; color: var(--text); }
  .icon-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 13px; padding: 2px 5px; }
  .icon-btn:hover { color: var(--red); }

  @media (max-width: 720px) {
    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); transition: transform 0.2s; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
    .sidebar.open { transform: translateX(0); }
    .menu-btn { display: block; }
    .search-input { width: 120px; font-size: 12px; }
    .logo { font-size: 12px; }
    .overlay-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
    .overlay-bg.visible { display: block; }
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <div class="logo" onclick="showRecents()">Media<span>Stream</span></div>
  <div class="header-right">
    <input class="search-input" type="text" placeholder="Rechercher…" id="search-input" oninput="filterEpisodes()" />
    <button class="settings-btn" onclick="showSettingsModal()" title="Paramètres">⚙</button>
  </div>
</header>

<div class="main">
  <div class="overlay-bg" id="overlay-bg" onclick="toggleSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Dossiers</span>
      <button class="btn-add" onclick="showModal('new-folder')">+ Dossier</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <div class="content">
    <div class="content-header">
      <span class="content-title" id="content-title">Accueil</span>
      <span class="badge badge-blue" id="content-badge" style="display:none;"></span>
      <button class="btn-add" onclick="showModal('add-feed')" id="btn-add-feed" style="margin-left:auto;display:none;">+ Podcast</button>
    </div>
    <div class="episodes-list" id="episodes-list"></div>
  </div>
</div>

<div class="player">
  <div class="player-top">
    <div class="player-art" id="player-art">🎙</div>
    <div class="player-info">
      <div class="player-title" id="player-title">Aucun média en cours</div>
      <div class="player-sub" id="player-sub">—</div>
    </div>
    <div class="player-status idle" id="player-status">IDLE</div>
  </div>
  <audio id="audio-player" controls preload="metadata"></audio>
  <video id="video-player" controls preload="metadata" style="display:none;width:100%;max-height:240px;border-radius:6px;background:#000;margin-top:4px;"></video>
  <div class="control-bar">
    <button class="control-btn icon-only" onclick="playPrevious()" title="Précédent">⏮</button>
    <button class="control-btn icon-only" onclick="seekBy(-10)" title="-10 secondes">⏪</button>
    <button class="control-btn icon-only" onclick="restartCurrent()" title="Recommencer">↺</button>
    <button class="control-btn icon-only" onclick="seekBy(10)" title="+10 secondes">⏩</button>
    <button class="control-btn icon-only" onclick="playNext()" title="Suivant">⏭</button>
    <div class="control-spacer"></div>
    <button class="control-btn icon-only" id="btn-shuffle" onclick="toggleShuffle()" title="Lecture aléatoire">🔀</button>
    <button class="control-btn icon-only" id="btn-loop" onclick="toggleLoop()" title="Boucle">🔁</button>
  </div>
  <div class="speed-bar">
    <span class="speed-label">Vitesse</span>
    <button class="speed-btn" onclick="setSpeed(0.5)">×0.5</button>
    <button class="speed-btn" onclick="setSpeed(0.75)">×0.75</button>
    <button class="speed-btn active" onclick="setSpeed(1)">×1</button>
    <button class="speed-btn" onclick="setSpeed(1.25)">×1.25</button>
    <button class="speed-btn" onclick="setSpeed(1.5)">×1.5</button>
    <button class="speed-btn" onclick="setSpeed(2)">×2</button>
  </div>
</div>

<div class="modal-overlay" id="modal" style="display:none;" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Ajouter</div>
    <div class="modal-error" id="modal-error" style="display:none;"></div>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════
const PROXY = 'https://media-proxy.chrissorbadere.workers.dev/?url=';
const DRIVE_API_KEY = 'AIzaSyA6_HNdd9V9bjMjs2-8kSBri7UsFNi9dow';
const STORAGE_KEY = 'mediastream_data_v2';
const POSITION_KEY = 'mediastream_positions_v2';
const HISTORY_KEY = 'mediastream_history_v2';

const DEFAULT_FOLDERS = [
  {
    id: 'politique', name: 'Politique', icon: '🗳',
    feeds: [
      { name: "L'heure des pros (CNews)", url: 'https://feeds.acast.com/public/shows/lheure-des-pros' },
      { name: "Le Collimateur", url: 'https://feeds.audiomeans.fr/feed/64ee3763-1a46-44c2-8640-3a69405a3ad8.xml' },
      { name: "New Deal (Slate)", url: 'https://feeds.360.audion.fm/6DEDYNDVuyDDA-xbBAq8y' },
      { name: "Le monde devant soi (Slate)", url: 'https://feeds.360.audion.fm/le-monde-devant-soi' },
    ]
  },
  {
    id: 'histoire', name: 'Histoire', icon: '📜',
    feeds: [
      { name: "Entrez dans l'histoire (RTL)", url: 'https://feeds.audiomeans.fr/feed/971b31f2-42d6-4d41-95ee-1c0554528483.xml' },
      { name: "Secrets d'histoire", url: 'https://feeds.360.audion.fm/wdHHhlNbFMLhqQi-Xdw3a' },
      { name: "Autant en emporte l'histoire", url: 'https://radiofrance-podcast.net/podcast09/35099478-7c72-4f9e-a6de-1b928400e9e5/rss_14435.xml' },
      { name: "Au cœur de l'histoire (Europe 1)", url: 'https://feeds.audiomeans.fr/feed/7c44ef0d-1d1c-4230-9da1-b2e4f839108c.xml' },
    ]
  },
  {
    id: 'science', name: 'Science', icon: '🔬',
    feeds: [
      { name: "Renaud Dékode", url: 'https://feed.ausha.co/RdgJASVVxKke' },
    ]
  },
  {
    id: 'social', name: 'Social', icon: '🌍',
    feeds: [
      { name: "Legend (Guillaume Pley)", url: 'https://feeds.acast.com/public/shows/legend-guillaume-pley' },
      { name: "Thinkerview", url: 'https://www.thinkerview.com/feed/podcast/' },
    ]
  },
  {
    id: 'spiritualite', name: 'Spiritualité', icon: '✨',
    feeds: [
      { name: "Arcana (Ludovic Richer)", url: 'https://feed.ausha.co/B4O4Ltpnk3ZM' },
    ]
  },
  {
    id: 'litterature', name: 'Littérature', icon: '📚', feeds: []
  },
];

const DEFAULT_DRIVE_FOLDERS = [
  { name: 'Mon Drive', id: '1EUUZ6lsS3vUqOvusvrKcwdHS9s_65iO9' }
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let folders = [];
let driveFolders = [];
let currentView = null; // {type:'folder'|'recents'|'archives'|'drive', id:..., folder?:..., items?:...}
let currentEpisodes = [];
let activeEpisodeEl = null;
let activeEpisode = null;
let modalMode = '';
let modalContext = null;
let shuffleMode = false;
let loopMode = false; // false | 'one' | 'all'
let expandedFolders = new Set(); // dossiers dépliés

// ═══════════════════════════════════════════
// PERSISTANCE
// ═══════════════════════════════════════════
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const data = JSON.parse(saved);
      folders = data.folders || JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
      driveFolders = data.driveFolders || JSON.parse(JSON.stringify(DEFAULT_DRIVE_FOLDERS));
      // Migration : ajoute les nouveaux podcasts par défaut si absents
      let migrated = false;
      DEFAULT_FOLDERS.forEach(def => {
        const existing = folders.find(f => f.id === def.id);
        if (!existing) { folders.push(JSON.parse(JSON.stringify(def))); migrated = true; return; }
        def.feeds.forEach(defFeed => {
          if (!existing.feeds.some(f => f.url === defFeed.url)) {
            existing.feeds.push({ ...defFeed }); migrated = true;
          }
        });
      });
      if (migrated) saveData();
    } else {
      folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
      driveFolders = JSON.parse(JSON.stringify(DEFAULT_DRIVE_FOLDERS));
      saveData();
    }
  } catch(e) {
    folders = JSON.parse(JSON.stringify(DEFAULT_FOLDERS));
    driveFolders = JSON.parse(JSON.stringify(DEFAULT_DRIVE_FOLDERS));
  }
}
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ folders, driveFolders })); } catch(e) {}
}
function getPositions() {
  try { return JSON.parse(localStorage.getItem(POSITION_KEY) || '{}'); } catch(e) { return {}; }
}
function savePosition(url, time) {
  if (!url || !time || time < 5) return;
  try {
    const positions = getPositions();
    positions[url] = { time, date: Date.now() };
    const entries = Object.entries(positions);
    if (entries.length > 200) {
      entries.sort((a,b) => b[1].date - a[1].date);
      localStorage.setItem(POSITION_KEY, JSON.stringify(Object.fromEntries(entries.slice(0,200))));
    } else {
      localStorage.setItem(POSITION_KEY, JSON.stringify(positions));
    }
  } catch(e) {}
}
function getPosition(url) { return getPositions()[url]?.time || 0; }

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
}
function addToHistory(ep) {
  if (!ep.url) return;
  try {
    let history = getHistory();
    history = history.filter(h => h.url !== ep.url);
    history.unshift({ ...ep, listenedAt: Date.now() });
    if (history.length > 100) history = history.slice(0, 100);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  } catch(e) {}
}

// ═══════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════
function renderSidebar() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';

  // Dossiers spéciaux
  list.appendChild(makeSpecialItem('recents', '🕒', 'Récents', currentView?.type === 'recents'));

      div.className = 'folder-item' + (isActive ? ' active' : '');

  addDrive.style.fontSize = '12px';

// ═══════════════════════════════════════════
// CHARGEMENT FLUX
// ═══════════════════════════════════════════
async function loadFeed(feed) {
  const res = await fetch(PROXY + encodeURIComponent(feed.url), { signal: AbortSignal.timeout(15000) });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  const parser = new DOMParser();
  const xml = parser.parseFromString(text, 'application/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML invalide');
  const items = xml.querySelectorAll('item');
  return Array.from(items).slice(0, 10).map(item => {
    const enc = item.querySelector('enclosure');
    return {
      title: item.querySelector('title')?.textContent || 'Sans titre',
      date: item.querySelector('pubDate')?.textContent || '',
      url: enc?.getAttribute('url') || '',
      feed: feed.name,
      type: 'audio',
    };
  }).filter(e => e.url);
}

async function loadFolder(folder) {
  const list = document.getElementById('episodes-list');
  list.innerHTML = `<div class="loading-text">Chargement<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>`;
  currentEpisodes = [];

  if (!folder.feeds.length) {
    list.innerHTML = '<div class="empty-text">Aucun podcast dans ce dossier.<br>Clique sur "+ Podcast" pour en ajouter.</div>';
    document.getElementById('content-badge').style.display = 'none';
    return;
  }

  const results = await Promise.allSettled(folder.feeds.map(f => loadFeed(f)));
  let allEps = [];
  const failed = [];
  results.forEach((r, i) => {
    if (r.status === 'fulfilled') allEps = allEps.concat(r.value);
    else failed.push(folder.feeds[i].name);
  });
  allEps.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
  currentEpisodes = allEps;
  renderEpisodes(allEps);

  const badge = document.getElementById('content-badge');
  badge.textContent = allEps.length + ' épisodes' + (failed.length ? ` · ${failed.length} ⨯` : '');
  badge.style.display = 'inline';
  badge.className = failed.length && !allEps.length ? 'badge badge-red' : 'badge badge-blue';
  if (failed.length) console.warn('Échec:', failed);
}

function renderEpisodes(eps) {
  const list = document.getElementById('episodes-list');
  list.innerHTML = '';
  if (!eps.length) { list.innerHTML = '<div class="empty-text">Aucun épisode</div>'; return; }
  eps.forEach(ep => {
    const div = document.createElement('div');
    div.className = 'episode-item';
    const pos = getPosition(ep.url);
    const resumeTxt = pos > 5 ? `<span class="ep-resume">⏱ ${formatTime(pos)}</span>` : '';
    const icon = ep.type === 'video' ? '🎬' : (ep.type === 'drive' ? '☁' : '🎙');
    div.innerHTML = `
      <div class="ep-thumb">${icon}</div>
      <div class="ep-info">
        <div class="ep-title">${escapeHTML(ep.title)}</div>
        <div class="ep-meta">
          <span class="ep-source">${escapeHTML(ep.feed)}</span>
          <span>${formatDate(ep.date)}</span>
          ${resumeTxt}
        </div>
      </div>
      <div class="ep-action">▶</div>`;
    div.onclick = () => playEpisode(ep, div);
    list.appendChild(div);
  });
}

function filterEpisodes() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) return renderEpisodes(currentEpisodes);
  renderEpisodes(currentEpisodes.filter(e =>
    e.title.toLowerCase().includes(q) || (e.feed||'').toLowerCase().includes(q)
  ));
}

async function selectDrive(idx) {
  currentView = { type: 'drive', idx };
  closeSidebar();
  const d = driveFolders[idx];

  // Tentative de récupération du vrai nom du dossier depuis l'API Drive
  try {
    const metaUrl = `https://www.googleapis.com/drive/v3/files/${d.id}?fields=name&key=${DRIVE_API_KEY}`;
    const res = await fetch(metaUrl);
    const meta = await res.json();
    if (meta.name && meta.name !== d.name) {
      d.name = meta.name;
      saveData();
    }
  } catch(e) { /* on garde le nom local */ }

  renderSidebar();
  document.getElementById('content-title').textContent = '☁ ' + d.name;
  document.getElementById('btn-add-feed').style.display = 'none';
  loadDriveFolder(d.id);

async function loadDriveFolder(folderId) {
  const list = document.getElementById('episodes-list');
  list.innerHTML = `<div class="loading-text">Chargement Drive<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>`;
  currentEpisodes = [];

  try {
    const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&fields=files(id,name,mimeType,size)&orderBy=name&key=${DRIVE_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const files = (data.files || []).filter(f => f.mimeType.includes('audio') || f.mimeType.includes('video'));
    if (!files.length) {
      list.innerHTML = '<div class="empty-text">Aucun fichier audio/vidéo dans ce dossier.<br><small style="color:var(--text3);">Vérifie que le dossier est partagé "avec le lien".</small></div>';
      return;
    }

    const eps = files.map(f => ({
      title: f.name,
      date: '',
      url: `https://www.googleapis.com/drive/v3/files/${f.id}?alt=media&key=${DRIVE_API_KEY}`,
      feed: 'Google Drive',
      type: f.mimeType.includes('video') ? 'video' : 'drive',
      mimeType: f.mimeType,
      driveId: f.id,
      isDrive: true,
    }));
    currentEpisodes = eps;
    renderEpisodes(eps);

    const badge = document.getElementById('content-badge');
    badge.textContent = eps.length + ' fichiers';
    badge.style.display = 'inline';
    badge.className = 'badge badge-blue';
  } catch(e) {
    list.innerHTML = `<div class="error-text" style="color:var(--red);padding:12px;">Erreur Drive : ${escapeHTML(e.message)}</div>`;
  }
}

// ═══════════════════════════════════════════
// LECTEUR
// ═══════════════════════════════════════════
const audio = document.getElementById('audio-player');
const video = document.getElementById('video-player');
let activeMedia = audio; // alias vers le lecteur actuellement actif

function playEpisode(ep, el) {
  if (activeEpisodeEl) activeEpisodeEl.classList.remove('playing');
  if (el) { el.classList.add('playing'); activeEpisodeEl = el; }
  activeEpisode = ep;

  // Choix du lecteur selon le type
  const isVideo = ep.type === 'video';
  if (isVideo) {
    audio.pause(); audio.style.display = 'none';
    video.style.display = 'block';
    activeMedia = video;
  } else {
    video.pause(); video.style.display = 'none';
    audio.style.display = 'block';
    activeMedia = audio;
  }

  // Stream : Drive direct (API supporte CORS), tout le reste via proxy
  activeMedia.src = ep.isDrive ? ep.url : (PROXY + encodeURIComponent(ep.url));

  document.getElementById('player-title').textContent = ep.title;
  document.getElementById('player-sub').textContent = ep.feed || '';
  document.getElementById('player-art').textContent = isVideo ? '🎬' : (ep.type === 'drive' ? '☁' : '🎙');

  addToHistory(ep);

  const onceLoaded = () => {
    const saved = getPosition(ep.url);
    if (saved > 5 && activeMedia.duration && saved < activeMedia.duration - 10) {
      activeMedia.currentTime = saved;
    }
    activeMedia.play().catch(e => console.warn('Lecture refusée:', e));
  };
  activeMedia.addEventListener('loadedmetadata', onceLoaded, { once: true });

  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: ep.title, artist: ep.feed || '', album: 'MediaStream',
    });
    navigator.mediaSession.setActionHandler('play', () => activeMedia.play());
    navigator.mediaSession.setActionHandler('pause', () => activeMedia.pause());
    navigator.mediaSession.setActionHandler('previoustrack', () => playPrevious());
    navigator.mediaSession.setActionHandler('nexttrack', () => playNext());
    navigator.mediaSession.setActionHandler('seekbackward', e => activeMedia.currentTime = Math.max(0, activeMedia.currentTime - (e.seekOffset||10)));
    navigator.mediaSession.setActionHandler('seekforward', e => activeMedia.currentTime = Math.min(activeMedia.duration||Infinity, activeMedia.currentTime + (e.seekOffset||10)));
    try { navigator.mediaSession.setActionHandler('seekto', e => { activeMedia.currentTime = e.seekTime; }); } catch(e) {}
  }
}

// Événements communs aux deux lecteurs
[audio, video].forEach(m => {
  m.addEventListener('play', () => {
    document.getElementById('player-status').className = 'player-status';
    document.getElementById('player-status').textContent = '● LIVE';
  });
  m.addEventListener('pause', () => {
    document.getElementById('player-status').className = 'player-status idle';
    document.getElementById('player-status').textContent = 'PAUSE';
  });
  let lastSave = 0;
  m.addEventListener('timeupdate', () => {
    if (activeEpisode && m === activeMedia && m.currentTime > 5 && Date.now() - lastSave > 5000) {
      savePosition(activeEpisode.url, m.currentTime);
      lastSave = Date.now();
    }
  });
  m.addEventListener('ended', () => {
    if (m !== activeMedia) return;
    if (loopMode === 'one') { m.currentTime = 0; m.play(); }
    else { playNext(); }
  });
});

function setSpeed(rate) {
  audio.playbackRate = rate;
  video.playbackRate = rate;
  document.querySelectorAll('.speed-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === '×' + rate);
  });
}

// ═══════════════════════════════════════════
// CONTROLES NAVIGATION
// ═══════════════════════════════════════════
function getCurrentIndex() {
  if (!activeEpisode) return -1;
  return currentEpisodes.findIndex(e => e.url === activeEpisode.url);
}

function playNext() {
  if (!currentEpisodes.length) return;
  let next;
  if (shuffleMode) {
    let idx;
    do { idx = Math.floor(Math.random() * currentEpisodes.length); }
    while (currentEpisodes.length > 1 && currentEpisodes[idx].url === activeEpisode?.url);
    next = currentEpisodes[idx];
  } else {
    const idx = getCurrentIndex();
    if (idx === -1) next = currentEpisodes[0];
    else if (idx < currentEpisodes.length - 1) next = currentEpisodes[idx + 1];
    else if (loopMode === 'all') next = currentEpisodes[0]; // boucle liste
    else return;
  }
  playEpisode(next, findEpisodeElement(next));
}

function playPrevious() {
  if (!currentEpisodes.length) return;
  const idx = getCurrentIndex();
  let prev;
  if (idx === -1 || idx === 0) prev = currentEpisodes[currentEpisodes.length - 1];
  else prev = currentEpisodes[idx - 1];
  playEpisode(prev, findEpisodeElement(prev));
}

function restartCurrent() {
  if (!activeEpisode) return;
  activeMedia.currentTime = 0;
  activeMedia.play();
}

function seekBy(seconds) {
  if (!activeEpisode) return;
  activeMedia.currentTime = Math.max(0, Math.min(activeMedia.duration || Infinity, activeMedia.currentTime + seconds));
}

function findEpisodeElement(ep) {
  const items = document.querySelectorAll('.episode-item');
  for (const el of items) {
    if (el.querySelector('.ep-title')?.textContent === ep.title) return el;
  }
  return null;
}

function toggleShuffle() {
  shuffleMode = !shuffleMode;
  document.getElementById('btn-shuffle').classList.toggle('active', shuffleMode);
}

function toggleLoop() {
  if (!loopMode) loopMode = 'all';
  else if (loopMode === 'all') loopMode = 'one';
  else loopMode = false;
  const btn = document.getElementById('btn-loop');
  btn.classList.toggle('active', !!loopMode);
  btn.textContent = loopMode === 'one' ? '🔂' : '🔁';
  btn.title = loopMode === 'one' ? 'Boucle épisode' : (loopMode === 'all' ? 'Boucle liste' : 'Boucle off');
}

}

function showSettingsModal() {
  modalMode = 'settings';
  document.getElementById('modal-title').textContent = '⚙ Paramètres';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-label">Mes données</div>
    <button class="btn-cancel" style="width:100%;margin-bottom:8px;" onclick="exportData()">📥 Exporter (JSON)</button>
    <button class="btn-cancel" style="width:100%;margin-bottom:8px;" onclick="document.getElementById('import-file').click()">📤 Importer un JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)" />
    <button class="btn-cancel" style="width:100%;margin-bottom:8px;" onclick="if(confirm('Vider l\\'historique ?')){localStorage.removeItem(HISTORY_KEY);location.reload();}">🗑 Vider l'historique</button>
    <button class="btn-danger" style="width:100%;" onclick="if(confirm('Tout réinitialiser ?')){localStorage.clear();location.reload();}">⚠ Tout réinitialiser</button>
    <div class="modal-label" style="margin-top:14px;">À propos</div>
    <div style="font-size:11px;color:var(--text3);font-family:var(--font-mono);line-height:1.6;">MediaStream v2.1<br>Proxy : Cloudflare Workers<br>© Christophe Soulas, 2026</div>`;
  document.getElementById('modal-actions').innerHTML = `<button class="btn-cancel" onclick="closeModal()">Fermer</button>`;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal() { document.getElementById('modal').style.display = 'none'; }
function closeModalOutside(e) { if (e.target.id === 'modal') closeModal(); }

function saveModal() {
  const errEl = document.getElementById('modal-error');
  errEl.style.display = 'none';

  if (modalMode === 'new-folder') {
    const name = document.getElementById('m-name').value.trim();
    const icon = document.getElementById('m-icon').value.trim() || '📁';
    if (!name) { errEl.textContent = 'Le nom est requis.'; errEl.style.display='block'; return; }
    const id = 'folder_' + Date.now();
    folders.push({ id, name, icon, feeds: [] });
    saveData(); closeModal(); selectFolder(id);
  } else if (modalMode === 'add-feed') {
    const name = document.getElementById('m-name').value.trim();
    const url = document.getElementById('m-url').value.trim();
    const folderId = document.getElementById('m-folder').value;
    if (!name || !url) { errEl.textContent = 'Nom et URL requis.'; errEl.style.display='block'; return; }
    const folder = folders.find(f => f.id === folderId);
    if (!folder) { errEl.textContent = 'Dossier introuvable.'; errEl.style.display='block'; return; }
    folder.feeds.push({ name, url });
    saveData(); closeModal();
    if (currentView?.type === 'folder' && currentView.id === folderId) loadFolder(folder);
    renderSidebar();
  } else if (modalMode === 'manage-folder') {
    const folder = folders.find(f => f.id === modalContext);
    folder.name = document.getElementById('m-name').value.trim() || folder.name;
    folder.icon = document.getElementById('m-icon').value.trim() || folder.icon;
    saveData(); closeModal(); renderSidebar();
    if (currentView?.type === 'folder' && currentView.id === folder.id) {
      document.getElementById('content-title').textContent = folder.name;
    }
  } else if (modalMode === 'edit-feed') {
    const name = document.getElementById('m-name').value.trim();
    const url = document.getElementById('m-url').value.trim();
    const newFolderId = document.getElementById('m-folder').value;
    if (!name || !url) { errEl.textContent = 'Nom et URL requis.'; errEl.style.display='block'; return; }
    const { folderId, idx } = modalContext;
    const oldFolder = folders.find(f => f.id === folderId);
    if (newFolderId === folderId) {
      // Simple modification
      oldFolder.feeds[idx] = { name, url };
    } else {
      // Déplacement vers un autre dossier
      oldFolder.feeds.splice(idx, 1);
      folders.find(f => f.id === newFolderId).feeds.push({ name, url });
    }
    saveData(); closeModal(); renderSidebar();
    if (currentView?.type === 'folder') {
      const f = folders.find(f => f.id === currentView.id);
      if (f) loadFolder(f);
    }
  } else if (modalMode === 'add-drive') {
    const name = document.getElementById('m-name').value.trim();
    const id = document.getElementById('m-id').value.trim();
    if (!name || !id) { errEl.textContent = 'Nom et ID requis.'; errEl.style.display='block'; return; }
    driveFolders.push({ name, id });
    saveData(); closeModal(); renderSidebar();
  } else if (modalMode === 'manage-drive') {
    const d = driveFolders[modalContext];
    d.name = document.getElementById('m-name').value.trim() || d.name;
    d.id = document.getElementById('m-id').value.trim() || d.id;
    saveData(); closeModal(); renderSidebar();
  }
}

function removeFeed(folderId, idx) {
  const folder = folders.find(f => f.id === folderId);
  folder.feeds.splice(idx, 1);
  saveData(); showFolderManager(folderId);
  if (currentView?.type === 'folder' && currentView.id === folderId) loadFolder(folder);
}

function editFeed(folderId, idx) {
  const folder = folders.find(f => f.id === folderId);
  const feed = folder.feeds[idx];
  modalMode = 'edit-feed';
  modalContext = { folderId, idx };
  document.getElementById('modal-title').textContent = '✎ Modifier le podcast';
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-label">Dossier de destination</div>
    <select class="modal-select" id="m-folder">
      ${folders.map(f => `<option value="${f.id}" ${f.id === folderId ? 'selected' : ''}>${escapeHTML(f.name)}</option>`).join('')}
    </select>
    <div class="modal-label">Nom du podcast</div>
    <input class="modal-input" id="m-name" value="${escapeHTML(feed.name)}" />
    <div class="modal-label">URL du flux RSS</div>
    <input class="modal-input" id="m-url" value="${escapeHTML(feed.url)}" />`;
  document.getElementById('modal-actions').innerHTML = `
    <button class="btn-cancel" onclick="showFolderManager('${folderId}')">Retour</button>
    <button class="btn-ok" onclick="saveModal()">Enregistrer</button>`;
}

function deleteFolder(folderId) {
  if (!confirm('Supprimer ce dossier ?')) return;
  folders = folders.filter(f => f.id !== folderId);
  saveData(); closeModal();
  if (currentView?.type === 'folder' && currentView.id === folderId) {
    showRecents();
  } else {
    renderSidebar();
  }
}

function deleteDrive(idx) {
  if (!confirm('Supprimer ce dossier Drive ?')) return;
  driveFolders.splice(idx, 1);
  saveData(); closeModal();
  if (currentView?.type === 'drive' && currentView.idx === idx) showRecents();
  else renderSidebar();
}

// ═══════════════════════════════════════════
// IMPORT / EXPORT
// ═══════════════════════════════════════════
function exportData() {
  const data = { folders, driveFolders, history: getHistory(), positions: getPositions() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mediastream-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) { folders = data; } // ancien format
      else {
        if (data.folders) folders = data.folders;
        if (data.driveFolders) driveFolders = data.driveFolders;
        if (data.history) localStorage.setItem(HISTORY_KEY, JSON.stringify(data.history));
        if (data.positions) localStorage.setItem(POSITION_KEY, JSON.stringify(data.positions));
      }
      saveData(); closeModal(); renderSidebar();
      alert('Importation réussie.');
    } catch(err) { alert('Erreur : ' + err.message); }
  };
  reader.readAsText(file);
}

// MOBILE
// ═══════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay-bg').classList.toggle('visible');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay-bg').classList.remove('visible');
}

// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function escapeHTML(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'}); }
  catch(e) { return d.slice(0,10); }
}
function formatTime(s) {
  s = Math.floor(s);
  const m = Math.floor(s/60), sec = s%60;
  if (m >= 60) { const h = Math.floor(m/60); return `${h}h${(m%60).toString().padStart(2,'0')}`; }
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
loadData();
showRecents(); // Page d'accueil

// Récupère en arrière-plan le vrai nom de chaque dossier Drive
(async () => {
  let updated = false;
  for (const d of driveFolders) {
    try {
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${d.id}?fields=name&key=${DRIVE_API_KEY}`);
      const meta = await res.json();
      if (meta.name && meta.name !== d.name) { d.name = meta.name; updated = true; }
    } catch(e) {}
  }
  if (updated) { saveData(); renderSidebar(); }
})();
</script>
